name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check pinned dependency ages before install
        run: |
          python tools/check_dependency_age.py \
            --requirements requirements.txt requirements-dev.txt \
            --pyproject pyproject.toml \
            --min-age-days 7

      - name: Install dependencies
        run: |
          python -m pip install pip==26.1.1
          python -m pip install -r requirements-dev.txt -e .

      - name: Check installed dependency closure ages
        run: |
          python tools/check_dependency_age.py \
            --installed-roots will-encrypt pytest pytest-cov pytest-xdist ruff mypy types-PyYAML pip-audit pip \
            --skip-pypi will-encrypt \
            --min-age-days 7

      - name: Audit dependencies
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check src tests tools

      - name: Type check
        run: python -m mypy src tests

      - name: Test
        run: python -m pytest
